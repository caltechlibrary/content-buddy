<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading…</title>
    <meta property="og:type" content="article">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:image" content="">
    <meta property="og:url" content="">
    <meta name="description" content="">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Helvetica, Arial, sans-serif; background: #f5f5f5; color: #333; }
        .page { max-width: 680px; margin: 2rem auto; background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .post-image { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
        .post-body { padding: 2rem; }
        .post-meta { font-size: 0.85rem; color: #888; margin-bottom: 0.75rem; }
        .post-title { font-size: 1.6rem; font-weight: bold; line-height: 1.25; margin-bottom: 1rem; color: #111; }
        .post-excerpt { font-size: 1rem; line-height: 1.65; color: #444; margin-bottom: 1.5rem; }
        .post-link { display: inline-block; background: #19747d; color: white; text-decoration: none; padding: 0.6rem 1.25rem; border-radius: 4px; font-size: 0.95rem; font-weight: 600; }
        .post-link:hover { background: #156068; }
        .placeholder-img { width: 100%; aspect-ratio: 16/9; background: #e8eef2; display: flex; align-items: center; justify-content: center; font-size: 3rem; }
        .error { padding: 3rem 2rem; text-align: center; color: #666; }
        .source-note { padding: 1rem 2rem; font-size: 0.75rem; color: #aaa; border-top: 1px solid #eee; text-align: center; }
        .source-note a { color: #aaa; }
    </style>
</head>
<body>
    <div class="page">
        <div id="content"><div class="error">Loading…</div></div>
        <div class="source-note">Generated by <a href="index.html">Content Buddy</a> · Caltech Library</div>
    </div>

    <script>
        async function init() {
            const id = new URLSearchParams(window.location.search).get('id');
            const contentEl = document.getElementById('content');

            if (!id) {
                document.title = 'Caltech Library News';
                contentEl.innerHTML = '<div class="error"><p>No post specified.</p></div>';
                return;
            }

            let data;
            try {
                const res = await fetch('posts.json');
                if (!res.ok) throw new Error();
                data = await res.json();
            } catch {
                contentEl.innerHTML = '<div class="error"><p>Could not load post data.</p></div>';
                return;
            }

            const post = (data.posts || []).find(p => p.id === id);

            if (!post) {
                document.title = 'Post not found';
                contentEl.innerHTML = '<div class="error"><p>Post not found.</p></div>';
                return;
            }

            document.title = post.title;
            setMeta('og:title', post.title);
            setMeta('og:url', window.location.href);
            if (post.excerpt) {
                setMeta('og:description', post.excerpt);
                setMeta('description', post.excerpt);
            }
            if (post.image) setMeta('og:image', post.image);
            if (post.link) {
                const canonical = document.createElement('link');
                canonical.rel = 'canonical';
                canonical.href = post.link;
                document.head.appendChild(canonical);
            }

            const date = post.date
                ? new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })
                : '';
            const meta = [post.author, date].filter(Boolean).join(' · ');

            const imgHtml = post.image
                ? `<img class="post-image" src="${esc(post.image)}" alt="">`
                : `<div class="placeholder-img" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>`;

            const readMore = post.link
                ? `<a class="post-link" href="${esc(post.link)}" target="_blank" rel="noopener noreferrer">Read Full Post</a>`
                : '';

            contentEl.innerHTML = `
                ${imgHtml}
                <div class="post-body">
                    ${meta ? `<div class="post-meta">${escHtml(meta)}</div>` : ''}
                    <h1 class="post-title">${escHtml(post.title)}</h1>
                    ${post.excerpt ? `<p class="post-excerpt">${escHtml(post.excerpt)}</p>` : ''}
                    ${readMore}
                </div>`;
        }

        function setMeta(name, content) {
            const sel = name.startsWith('og:')
                ? `meta[property="${name}"]`
                : `meta[name="${name}"]`;
            let el = document.querySelector(sel);
            if (!el) {
                el = document.createElement('meta');
                el.setAttribute(name.startsWith('og:') ? 'property' : 'name', name);
                document.head.appendChild(el);
            }
            el.setAttribute('content', content);
        }

        function esc(str) {
            return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        init();
    </script>
</body>
</html>
